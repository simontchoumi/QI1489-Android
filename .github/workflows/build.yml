name: Build QI1489 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev \
          build-essential python3-dev lld ccache

    - name: Install buildozer + Cython
      run: |
        pip install buildozer==1.5.0 cython==0.29.33

    - name: Set up Android SDK
      run: |
        # Download Android command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_DIR/cmdline-tools
        unzip -q cmdline-tools.zip -d $SDK_DIR/cmdline-tools
        mv $SDK_DIR/cmdline-tools/cmdline-tools $SDK_DIR/cmdline-tools/latest

        # Create legacy tools/bin symlink so older p4a/buildozer can find sdkmanager
        mkdir -p $SDK_DIR/tools/bin
        ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager
        ln -sf $SDK_DIR/cmdline-tools/latest/bin/avdmanager $SDK_DIR/tools/bin/avdmanager

        export PATH="$SDK_DIR/cmdline-tools/latest/bin:$PATH"

        # Accept all licenses
        yes | sdkmanager --sdk_root=$SDK_DIR --licenses || true

        # Install required SDK components
        sdkmanager --sdk_root=$SDK_DIR \
          "platforms;android-33" \
          "build-tools;33.0.2" \
          "platform-tools"

        # Accept licenses again after install
        yes | sdkmanager --sdk_root=$SDK_DIR --licenses || true

    - name: Cache buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}

    - name: Build APK
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
        export ANDROIDAPI="33"
        export ANDROIDMINAPI="21"
        buildozer android debug 2>&1

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: QI1489-debug-APK
        path: bin/*.apk
        if-no-files-found: error
